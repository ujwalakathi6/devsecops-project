version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit flask

  build:
    commands:
      - echo "Starting Advanced Security Policy Audit..."

      # Ignore commented lines and detect only active credentials
      - |
        if grep -q -E "^[^#]*\bADMIN_PASSWORD\s*=" secure_app/app.py; then
          echo "VULNERABILITY FOUND! Terminating Build..."
          exit 1
        else
          echo "No active hardcoded credentials found. System Secure."
        fi

      # Generate Bandit report
      - bandit -r . -lll -f txt -o bandit-report.txt || true

artifacts:
  files:
    - "**/*"