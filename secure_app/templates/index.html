<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreenidhi Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529; }
        .hero-section { background: linear-gradient(120deg, #212529, #343a40); color: white; padding: 60px 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { font-size: 1.2rem; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-0">
        <div class="container">
            <span class="navbar-brand mb-0 h1">DevSecOps Admin Portal</span>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4">Welcome to the Secure Portal</h1>
            <p class="lead">Monitoring infrastructure integrity in real-time.</p>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-5">
                    <h3>System Status</h3>
                    <hr>
                    <div class="mt-3">
                        <span class="badge bg-success status-badge">STATUS: ACTIVE</span>
                    </div>
                    <p class="text-muted mt-4">Protected by AWS CodePipeline & Bandit SAST</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
