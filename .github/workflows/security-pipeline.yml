name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Configure AWS Credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. SAST Scan (Bandit)
        run: |
          pip install bandit
          echo "Running Bandit scan..."
          bandit -r . -f txt -o bandit-report.txt || true
          echo "Checking if report exists..."
          ls -l bandit-report.txt || echo "Report not found"

      - name: 5. IaC Scan (Checkov)
        run: |
          pip install checkov
          checkov -d terraform/ --soft-fail > checkov-report.txt || true

      - name: 6. Debug - List Files
        run: ls -l

      - name: 7. Login to Amazon ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 8. Build Docker Image
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: django-security-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: 9. Container Scan (Trivy)
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/django-security-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt'

      - name: 10. Push Image to AWS ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY && success() }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: django-security-app
          IMAGE_TAG: latest
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: 11. Upload Security Reports to AWS S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -f bandit-report.txt ]; then
            aws s3 cp bandit-report.txt s3://shirisha-devsecops-report/
          else
            echo "bandit-report.txt not found"
          fi

          if [ -f checkov-report.txt ]; then
            aws s3 cp checkov-report.txt s3://shirisha-devsecops-report/
          else
            echo "checkov-report.txt not found"
          fi

          if [ -f trivy-report.txt ]; then
            aws s3 cp trivy-report.txt s3://shirisha-devsecops-report/
          else
            echo "trivy-report.txt not found"
          fi

      - name: AWS steps skipped info
        if: ${{ !secrets.AWS_ACCESS_KEY_ID || !secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "AWS credentials not configured in repository secrets; skipping ECR/S3 steps."
