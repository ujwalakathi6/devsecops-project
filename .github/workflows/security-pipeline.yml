name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit checkov

      - name: 5. SAST Scan (Bandit)
        run: |
          bandit -r . -lll -f txt -o bandit-report.txt || true

      - name: 6. IaC Scan (Checkov)
        run: |
          if [ -d terraform ]; then
            checkov -d terraform/ --soft-fail > checkov-report.txt || true
          else
            echo "terraform folder not found" > checkov-report.txt
          fi

      - name: 7. Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 8. Build Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: django-security-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: 9. Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/django-security-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt'

      - name: 10. Push Image to AWS ECR
        if: success()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: django-security-app
          IMAGE_TAG: latest
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: 11. Check Generated Reports
        if: always()
        run: |
          ls -l
          test -f bandit-report.txt && echo "bandit report exists" || echo "bandit report missing"
          test -f checkov-report.txt && echo "checkov report exists" || echo "checkov report missing"
          test -f trivy-report.txt && echo "trivy report exists" || echo "trivy report missing"

      - name: 12. Upload Security Reports to AWS S3
        if: always()
        run: |
          test -f bandit-report.txt && aws s3 cp bandit-report.txt s3://devops-security-reports-abhiii265/ || echo "bandit-report.txt not found"
          test -f checkov-report.txt && aws s3 cp checkov-report.txt s3://devops-security-reports-abhiii265/ || echo "checkov-report.txt not found"
          test -f trivy-report.txt && aws s3 cp trivy-report.txt s3://devops-security-reports-abhiii265/ || echo "trivy-report.txt not found"